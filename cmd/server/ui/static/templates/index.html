<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }

        .board-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .sidebar {
            width: 180px;
            padding: 16px;
            background: #ffffff;
            border: 2px solid #4a5568;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .sidebar h3 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .ship-palette {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
            background: #eef6ff;
            border: 2px dashed #4a5568;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .ship-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px;
            border-radius: 4px;
            background: #fff;
            border: 1px solid #cbd5e0;
            cursor: grab;
        }

        .ship-option.dragging {
            opacity: 0.6;
        }

        .ship-option.selected {
            border-color: #2b6cb0;
            background: #dbeafe;
        }

        .ship-option .ship-cell {
            width: 20px;
            height: 20px;
            border: 1px solid #4a5568;
        }

        .ship-option[data-color="blue"] .ship-cell {
            background: #2b6cb0;
        }

        .ship-option[data-color="green"] .ship-cell {
            background: #38a169;
        }

        .ship-option[data-color="orange"] .ship-cell {
            background: #d97706;
        }

        .rotate-btn {
            margin-top: 8px;
            padding: 6px 10px;
            border: 1px solid #4a5568;
            border-radius: 4px;
            background: #2b6cb0;
            color: #fff;
            cursor: pointer;
        }

        .ship-cell {
            width: 28px;
            height: 28px;
            background: #2b6cb0;
            border: 1px solid #1d4ed8;
            box-sizing: border-box;
        }

        .cell.ship-blue {
            background: #2b6cb0;
            border-color: #1d4ed8;
        }

        .cell.ship-green {
            background: #38a169;
            border-color: #2f855a;
        }

        .cell.ship-orange {
            background: #d97706;
            border-color: #b45309;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            gap: 4px;
            padding: 12px;
            background: #dce7f2;
            border: 2px solid #4a5568;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: #fff;
            border: 1px solid #a0aec0;
            box-sizing: border-box;
        }

        .cell.ready {
            outline: 2px dashed #2b6cb0;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="board-layout">
        <aside class="sidebar">
            <h3>Ship Builder</h3>
            <div id="shipPalette" class="ship-palette">
                <div class="ship-option" data-length="4" data-color="blue" draggable="true">
                    <div class="ship-cell"></div>
                    <div class="ship-cell"></div>
                    <div class="ship-cell"></div>
                    <div class="ship-cell"></div>
                </div>
                <div class="ship-option" data-length="3" data-color="green" draggable="true">
                    <div class="ship-cell"></div>
                    <div class="ship-cell"></div>
                    <div class="ship-cell"></div>
                </div>
                <div class="ship-option" data-length="2" data-color="orange" draggable="true">
                    <div class="ship-cell"></div>
                    <div class="ship-cell"></div>
                </div>
            </div>
            <button id="rotateShipBtn" class="rotate-btn" type="button">Rotate Ship (Horizontal)</button>
            <p>Drag it onto the board, or click it and then click a starting cell.</p>
        </aside>

        <div id="boardGrid" class="grid">
            <div class="cell" id="cell-1-1"></div>
            <div class="cell" id="cell-2-1"></div>
            <div class="cell" id="cell-3-1"></div>
            <div class="cell" id="cell-4-1"></div>
            <div class="cell" id="cell-5-1"></div>
            <div class="cell" id="cell-6-1"></div>
            <div class="cell" id="cell-7-1"></div>
            <div class="cell" id="cell-8-1"></div>
            <div class="cell" id="cell-9-1"></div>
            <div class="cell" id="cell-10-1"></div>

            <div class="cell" id="cell-1-2"></div>
            <div class="cell" id="cell-2-2"></div>
            <div class="cell" id="cell-3-2"></div>
            <div class="cell" id="cell-4-2"></div>
            <div class="cell" id="cell-5-2"></div>
            <div class="cell" id="cell-6-2"></div>
            <div class="cell" id="cell-7-2"></div>
            <div class="cell" id="cell-8-2"></div>
            <div class="cell" id="cell-9-2"></div>
            <div class="cell" id="cell-10-2"></div>

            <div class="cell" id="cell-1-3"></div>
            <div class="cell" id="cell-2-3"></div>
            <div class="cell" id="cell-3-3"></div>
            <div class="cell" id="cell-4-3"></div>
            <div class="cell" id="cell-5-3"></div>
            <div class="cell" id="cell-6-3"></div>
            <div class="cell" id="cell-7-3"></div>
            <div class="cell" id="cell-8-3"></div>
            <div class="cell" id="cell-9-3"></div>
            <div class="cell" id="cell-10-3"></div>

            <div class="cell" id="cell-1-4"></div>
            <div class="cell" id="cell-2-4"></div>
            <div class="cell" id="cell-3-4"></div>
            <div class="cell" id="cell-4-4"></div>
            <div class="cell" id="cell-5-4"></div>
            <div class="cell" id="cell-6-4"></div>
            <div class="cell" id="cell-7-4"></div>
            <div class="cell" id="cell-8-4"></div>
            <div class="cell" id="cell-9-4"></div>
            <div class="cell" id="cell-10-4"></div>

            <div class="cell" id="cell-1-5"></div>
            <div class="cell" id="cell-2-5"></div>
            <div class="cell" id="cell-3-5"></div>
            <div class="cell" id="cell-4-5"></div>
            <div class="cell" id="cell-5-5"></div>
            <div class="cell" id="cell-6-5"></div>
            <div class="cell" id="cell-7-5"></div>
            <div class="cell" id="cell-8-5"></div>
            <div class="cell" id="cell-9-5"></div>
            <div class="cell" id="cell-10-5"></div>

            <div class="cell" id="cell-1-6"></div>
            <div class="cell" id="cell-2-6"></div>
            <div class="cell" id="cell-3-6"></div>
            <div class="cell" id="cell-4-6"></div>
            <div class="cell" id="cell-5-6"></div>
            <div class="cell" id="cell-6-6"></div>
            <div class="cell" id="cell-7-6"></div>
            <div class="cell" id="cell-8-6"></div>
            <div class="cell" id="cell-9-6"></div>
            <div class="cell" id="cell-10-6"></div>

            <div class="cell" id="cell-1-7"></div>

            <div class="cell" id="cell-3-7"></div>
            <div class="cell" id="cell-4-7"></div>
            <div class="cell" id="cell-5-7"></div>
            <div class="cell" id="cell-6-7"></div>
            <div class="cell" id="cell-7-7"></div>
            <div class="cell" id="cell-8-7"></div>
            <div class="cell" id="cell-9-7"></div>
            <div class="cell" id="cell-10-7"></div>

            <div class="cell" id="cell-1-8"></div>
            <div class="cell" id="cell-2-8"></div>
            <div class="cell" id="cell-3-8"></div>
            <div class="cell" id="cell-4-8"></div>
            <div class="cell" id="cell-5-8"></div>
            <div class="cell" id="cell-6-8"></div>
            <div class="cell" id="cell-7-8"></div>
            <div class="cell" id="cell-8-8"></div>
            <div class="cell" id="cell-9-8"></div>
            <div class="cell" id="cell-10-8"></div>

            <div class="cell" id="cell-1-9"></div>
            <div class="cell" id="cell-2-9"></div>
            <div class="cell" id="cell-3-9"></div>
            <div class="cell" id="cell-4-9"></div>
            <div class="cell" id="cell-5-9"></div>
            <div class="cell" id="cell-6-9"></div>
            <div class="cell" id="cell-7-9"></div>
            <div class="cell" id="cell-8-9"></div>
            <div class="cell" id="cell-9-9"></div>
            <div class="cell" id="cell-10-9"></div>

            <div class="cell" id="cell-1-10"></div>
            <div class="cell" id="cell-2-10"></div>
            <div class="cell" id="cell-3-10"></div>
            <div class="cell" id="cell-4-10"></div>
            <div class="cell" id="cell-5-10"></div>
            <div class="cell" id="cell-6-10"></div>
            <div class="cell" id="cell-7-10"></div>
            <div class="cell" id="cell-8-10"></div>
            <div class="cell" id="cell-9-10"></div>
            <div class="cell" id="cell-10-10"></div>
        </div>
    </div>

    <script>
        const shipOptions = Array.from(document.querySelectorAll('.ship-option'));
        const rotateShipBtn = document.getElementById('rotateShipBtn');
        const cells = Array.from(document.querySelectorAll('.grid .cell'));
        let selectedShip = null;
        let shipOrientation = 'horizontal';

        shipOptions.forEach((option) => {
            option.addEventListener('dragstart', (event) => {
                event.dataTransfer.setData('text/plain', option.dataset.length);
                option.classList.add('dragging');
                selectedShip = option;
                highlightReadyCells();
            });

            option.addEventListener('dragend', () => {
                option.classList.remove('dragging');
                clearReadyCells();
            });

            option.addEventListener('click', () => {
                selectedShip = option;
                highlightReadyCells();
                shipOptions.forEach((item) => item.classList.remove('selected'));
                option.classList.add('selected');
            });
        });

        rotateShipBtn.addEventListener('click', () => {
            shipOrientation = shipOrientation === 'horizontal' ? 'vertical' : 'horizontal';
            rotateShipBtn.textContent = `Rotate Ship (${shipOrientation.charAt(0).toUpperCase() + shipOrientation.slice(1)})`;
            if (selectedShip) {
                highlightReadyCells();
            }
        });

        cells.forEach((cell) => {
            cell.addEventListener('dragover', (event) => event.preventDefault());

            cell.addEventListener('drop', (event) => {
                event.preventDefault();
                if (selectedShip) {
                    placeShip(cell);
                }
            });

            cell.addEventListener('click', () => {
                if (selectedShip) {
                    placeShip(cell);
                }
            });
        });

        function highlightReadyCells() {
            clearReadyCells();
            if (!selectedShip) {
                return;
            }

            const length = parseInt(selectedShip.dataset.length, 10);
            cells.forEach((cell) => {
                const [_, colStr, rowStr] = cell.id.split('-');
                const col = parseInt(colStr, 10);
                const row = parseInt(rowStr, 10);
                const canPlace = shipOrientation === 'horizontal'
                    ? col <= 10 - length
                    : row <= 10 - length;

                if (canPlace) {
                    cell.classList.add('ready');
                }
            });
            selectedShip.classList.add('selected');
        }

        function clearReadyCells() {
            cells.forEach((cell) => cell.classList.remove('ready'));
            shipOptions.forEach((item) => item.classList.remove('selected'));
        }

        function placeShip(startCell) {
            if (!selectedShip) {
                return;
            }

            const length = parseInt(selectedShip.dataset.length, 10);
            const [_, colStr, rowStr] = startCell.id.split('-');
            const startCol = parseInt(colStr, 10);
            const startRow = parseInt(rowStr, 10);

            const positions = [];
            for (let offset = 0; offset < length; offset += 1) {
                const col = shipOrientation === 'horizontal' ? startCol + offset : startCol;
                const row = shipOrientation === 'horizontal' ? startRow : startRow + offset;
                const cellId = `cell-${col}-${row}`;
                const targetCell = document.getElementById(cellId);

                if (!targetCell || targetCell.classList.contains('placed')) {
                    return;
                }

                positions.push(targetCell);
            }

            positions.forEach((cell) => {
                cell.classList.add('placed');
                cell.classList.add(`ship-${selectedShip.dataset.color}`);
            });

            const shipType = selectedShip.dataset.color;
            const coordinates = positions.map((cell) => {
                const parts = cell.id.split('-');
                return [parseInt(parts[2], 10), parseInt(parts[1], 10)];
            });
            const payload = {
                ship: shipType,
                positions: coordinates
            };

            fetch('http://localhost:8080/api/placement', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            }).catch((error) => {
                console.error('Failed to submit placement:', error);
            });

            selectedShip.remove();
            selectedShip = null;
            clearReadyCells();
        }
    </script>
</body>

</html>
