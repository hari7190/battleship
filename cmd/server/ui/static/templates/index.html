    <title>Battleship Board</title>

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            gap: 4px;
            padding: 12px;
            background: #dce7f2;
            border: 2px solid #4a5568;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: #fff;
            border: 1px solid #a0aec0;
            box-sizing: border-box;
        }
    </style>
</head>
