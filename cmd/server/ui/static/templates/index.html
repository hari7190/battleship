<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }

        .board-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .sidebar {
            width: 180px;
            padding: 16px;
            background: #ffffff;
            border: 2px solid #4a5568;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .sidebar h3 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .ship-palette {
            display: flex;
            gap: 4px;
            padding: 8px;
            background: #eef6ff;
            border: 2px dashed #4a5568;
            border-radius: 6px;
            cursor: grab;
            margin-bottom: 8px;
        }

        .ship-palette.dragging {
            opacity: 0.6;
        }

        .ship-palette.selected {
            border-color: #2b6cb0;
            background: #dbeafe;
        }

        .rotate-btn {
            margin-top: 8px;
            padding: 6px 10px;
            border: 1px solid #4a5568;
            border-radius: 4px;
            background: #2b6cb0;
            color: #fff;
            cursor: pointer;
        }

        .ship-cell {
            width: 28px;
            height: 28px;
            background: #2b6cb0;
            border: 1px solid #1d4ed8;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            gap: 4px;
            padding: 12px;
            background: #dce7f2;
            border: 2px solid #4a5568;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: #fff;
            border: 1px solid #a0aec0;
            box-sizing: border-box;
        }

        .cell.placed {
            background: #2b6cb0;
            border-color: #1d4ed8;
        }

        .cell.ready {
            outline: 2px dashed #2b6cb0;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="board-layout">
        <aside class="sidebar">
            <h3>Ship Builder</h3>
            <div id="shipPalette" class="ship-palette" draggable="true">
                <div class="ship-cell"></div>
                <div class="ship-cell"></div>
                <div class="ship-cell"></div>
                <div class="ship-cell"></div>
            </div>
            <button id="rotateShipBtn" class="rotate-btn" type="button">Rotate Ship (Horizontal)</button>
            <p>Drag it onto the board, or click it and then click a starting cell.</p>
        </aside>

        <div id="boardGrid" class="grid">
            <div class="cell" id="cell-1-1"></div>
            <div class="cell" id="cell-2-1"></div>
            <div class="cell" id="cell-3-1"></div>
            <div class="cell" id="cell-4-1"></div>
            <div class="cell" id="cell-5-1"></div>
            <div class="cell" id="cell-6-1"></div>
            <div class="cell" id="cell-7-1"></div>
            <div class="cell" id="cell-8-1"></div>
            <div class="cell" id="cell-9-1"></div>
            <div class="cell" id="cell-10-1"></div>

            <div class="cell" id="cell-1-2"></div>
            <div class="cell" id="cell-2-2"></div>
            <div class="cell" id="cell-3-2"></div>
            <div class="cell" id="cell-4-2"></div>
            <div class="cell" id="cell-5-2"></div>
            <div class="cell" id="cell-6-2"></div>
            <div class="cell" id="cell-7-2"></div>
            <div class="cell" id="cell-8-2"></div>
            <div class="cell" id="cell-9-2"></div>
            <div class="cell" id="cell-10-2"></div>

            <div class="cell" id="cell-1-3"></div>
            <div class="cell" id="cell-2-3"></div>
            <div class="cell" id="cell-3-3"></div>
            <div class="cell" id="cell-4-3"></div>
            <div class="cell" id="cell-5-3"></div>
            <div class="cell" id="cell-6-3"></div>
            <div class="cell" id="cell-7-3"></div>
            <div class="cell" id="cell-8-3"></div>
            <div class="cell" id="cell-9-3"></div>
            <div class="cell" id="cell-10-3"></div>

            <div class="cell" id="cell-1-4"></div>
            <div class="cell" id="cell-2-4"></div>
            <div class="cell" id="cell-3-4"></div>
            <div class="cell" id="cell-4-4"></div>
            <div class="cell" id="cell-5-4"></div>
            <div class="cell" id="cell-6-4"></div>
            <div class="cell" id="cell-7-4"></div>
            <div class="cell" id="cell-8-4"></div>
            <div class="cell" id="cell-9-4"></div>
            <div class="cell" id="cell-10-4"></div>

            <div class="cell" id="cell-1-5"></div>
            <div class="cell" id="cell-2-5"></div>
            <div class="cell" id="cell-3-5"></div>
            <div class="cell" id="cell-4-5"></div>
            <div class="cell" id="cell-5-5"></div>
            <div class="cell" id="cell-6-5"></div>
            <div class="cell" id="cell-7-5"></div>
            <div class="cell" id="cell-8-5"></div>
            <div class="cell" id="cell-9-5"></div>
            <div class="cell" id="cell-10-5"></div>

            <div class="cell" id="cell-1-6"></div>
            <div class="cell" id="cell-2-6"></div>
            <div class="cell" id="cell-3-6"></div>
            <div class="cell" id="cell-4-6"></div>
            <div class="cell" id="cell-5-6"></div>

            <div class="cell" id="cell-4-7"></div>
            <div class="cell" id="cell-5-7"></div>
            <div class="cell" id="cell-6-7"></div>
            <div class="cell" id="cell-7-7"></div>

            <div class="cell" id="cell-10-7"></div>

            <div class="cell" id="cell-1-8"></div>

            <div class="cell" id="cell-1-10"></div>
            <div class="cell" id="cell-2-10"></div>
            <div class="cell" id="cell-3-10"></div>
            <div class="cell" id="cell-4-10"></div>
            <div class="cell" id="cell-5-10"></div>
            <div class="cell" id="cell-6-10"></div>
            <div class="cell" id="cell-7-10"></div>
            <div class="cell" id="cell-8-10"></div>
            <div class="cell" id="cell-9-10"></div>
            <div class="cell" id="cell-10-10"></div>
        </div>
    </div>

    <script>
        const shipPalette = document.getElementById('shipPalette');
        const rotateShipBtn = document.getElementById('rotateShipBtn');
        const cells = Array.from(document.querySelectorAll('.grid .cell'));
        let selectedShip = false;
        let shipOrientation = 'horizontal';

        shipPalette.addEventListener('dragstart', (event) => {
            event.dataTransfer.setData('text/plain', 'ship');
            shipPalette.classList.add('dragging');
            selectedShip = true;
            highlightReadyCells();
        });

        shipPalette.addEventListener('dragend', () => {
            shipPalette.classList.remove('dragging');
            clearReadyCells();
        });

        shipPalette.addEventListener('click', () => {
            selectedShip = true;
            highlightReadyCells();
            shipPalette.classList.add('selected');
        });

        rotateShipBtn.addEventListener('click', () => {
            shipOrientation = shipOrientation === 'horizontal' ? 'vertical' : 'horizontal';
            rotateShipBtn.textContent = `Rotate Ship (${shipOrientation.charAt(0).toUpperCase() + shipOrientation.slice(1)})`;
            highlightReadyCells();
        });

        cells.forEach((cell) => {
            cell.addEventListener('dragover', (event) => event.preventDefault());

            cell.addEventListener('drop', (event) => {
                event.preventDefault();
                if (selectedShip) {
                    placeShip(cell);
                }
            });

            cell.addEventListener('click', () => {
                if (selectedShip) {
                    placeShip(cell);
                }
            });
        });

        function highlightReadyCells() {
            clearReadyCells();
            cells.forEach((cell) => {
                const [_, colStr, rowStr] = cell.id.split('-');
                const col = parseInt(colStr, 10);
                const row = parseInt(rowStr, 10);
                const canPlace = shipOrientation === 'horizontal'
                    ? col <= 7
                    : row <= 7;

                if (canPlace) {
                    cell.classList.add('ready');
                }
            });
            shipPalette.classList.add('selected');
        }

        function clearReadyCells() {
            cells.forEach((cell) => cell.classList.remove('ready'));
            shipPalette.classList.remove('selected');
        }

        function placeShip(startCell) {
            const [_, colStr, rowStr] = startCell.id.split('-');
            const startCol = parseInt(colStr, 10);
            const startRow = parseInt(rowStr, 10);

            const positions = [];
            for (let offset = 0; offset < 4; offset += 1) {
                const col = shipOrientation === 'horizontal' ? startCol + offset : startCol;
                const row = shipOrientation === 'horizontal' ? startRow : startRow + offset;
                const cellId = `cell-${col}-${row}`;
                const targetCell = document.getElementById(cellId);

                if (!targetCell || targetCell.classList.contains('placed')) {
                    return;
                }

                positions.push(targetCell);
            }

            positions.forEach((cell) => cell.classList.add('placed'));
            selectedShip = false;
            clearReadyCells();
        }
    </script>
</body>

</html>
